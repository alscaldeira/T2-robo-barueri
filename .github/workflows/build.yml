name: Gerar Executável EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest   # só Windows gera .exe

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset\bin" >> $env:GITHUB_PATH

      - name: Configurar JDK 17 (Oracle)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'   # Oracle JDK inclui o jpackage
          cache: maven

      - name: Compilar e gerar fat JAR
        run: mvn clean package

      - name: Gerar .exe com jpackage
        run: |
          # Encontra o nome do JAR com dependências
          $jarFile = Get-ChildItem -Path target\*-jar-with-dependencies.jar | Select-Object -First 1
          jpackage --type exe `
                   --input target/ `
                   --name RoboBarueri `
                   --main-jar $jarFile.Name `
                   --main-class robo.barueri.Main `
                   --dest output/ `
                   --win-console   # opcional: mostra console para ver logs
        shell: pwsh

      - name: Upload do .exe
        uses: actions/upload-artifact@v4
        with:
          name: robo-barueri-exe
          path: output/*.exe